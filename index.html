<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruby WASM Todo</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Ruby WASM -->
    <script src="https://cdn.jsdelivr.net/npm/@ruby/wasm-wasi@2.8.1/dist/browser.umd.js"></script>
    <!-- App Logic -->
    <script src="js/app.js" type="module"></script>
</head>

<body class="theme-dark">
    <!-- SPLASH -->
    <div id="splash" class="splash-screen">
        <div class="splash-icon">
            <i class="ph-fill ph-diamond"></i>
        </div>
        <h1 class="splash-title">Bootstrapping Ruby</h1>
        <div id="splash-msg" class="splash-msg mono">Fetching ruby+stdlib.wasm (~25 MB)…</div>
        <div class="progress-bar-container">
            <div id="splash-bar" class="progress-bar"></div>
        </div>
        <div id="splash-err" class="splash-error" style="display:none"></div>
    </div>

    <!-- APP -->
    <div id="app" class="app-container" style="display:none">
        <!-- Header -->
        <header class="app-header">
            <div class="brand">
                <div class="brand-icon">
                    <i class="ph-fill ph-diamond"></i>
                </div>
                <div class="brand-text">
                    <h1>Ruby WASM Todo</h1>
                    <p class="mono sub-brand">All logic runs in Ruby 4.0 · WASI in the browser</p>
                </div>
            </div>
            <div id="badge" class="badge glass mono"></div>
        </header>

        <main class="app-layout">
            <!-- LEFT PANEL -->
            <section class="panel-left">
                <!-- Add form -->
                <div class="glass card task-form">
                    <h2 class="card-title"><i class="ph ph-plus-circle"></i> New Task</h2>
                    <div class="form-row">
                        <input id="ni" class="input-primary" type="text" placeholder="What needs to be done?" />
                        <div class="select-wrapper">
                            <select id="np" class="select-primary">
                                <option value="high">🔴 High Priority</option>
                                <option value="medium" selected>🟡 Medium Priority</option>
                                <option value="low">🟢 Low Priority</option>
                            </select>
                            <i class="ph ph-caret-down select-icon"></i>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-icon-wrapper">
                            <i class="ph ph-tag input-icon"></i>
                            <input id="nt" class="input-secondary with-icon" type="text"
                                placeholder="Tags (comma separated)…" />
                        </div>
                        <input id="nd" class="input-date" type="date" />
                        <button id="add-btn" class="btn-primary">Add Task <i
                                class="ph-bold ph-arrow-right"></i></button>
                        <button id="fake-btn" class="btn-secondary" title="Ruby Faker Gem"><i
                                class="ph-fill ph-magic-wand"></i></button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="controls-container">
                    <div class="filters">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="active">Active</button>
                        <button class="filter-btn" data-filter="done">Done</button>
                        <button class="filter-btn" data-filter="high">🔴 High</button>
                        <button class="filter-btn" data-filter="overdue">⚠️ Overdue</button>
                    </div>
                    <div class="search-box">
                        <i class="ph ph-magnifying-glass search-icon"></i>
                        <input id="search" class="input-search" type="text" placeholder="Search tasks…" />
                    </div>
                </div>

                <!-- List -->
                <div id="todo-list" class="todo-list"></div>
                <div id="empty" class="empty-state" style="display:none">
                    <div class="empty-icon"><i class="ph-duotone ph-check-circle"></i></div>
                    <div class="empty-text">All caught up! No tasks found.</div>
                </div>
            </section>

            <!-- RIGHT PANEL -->
            <section class="panel-right">
                <!-- Analytics -->
                <div class="glass card analytics-card">
                    <h2 class="card-title">
                        <i class="ph ph-chart-bar"></i> Analytics
                        <span class="mono card-subtitle">(live Ruby)</span>
                    </h2>
                    <div id="analytics" class="analytics-content"></div>
                </div>

                <!-- REPL -->
                <div class="glass card repl-card">
                    <h2 class="card-title"><i class="ph ph-terminal-window"></i> Ruby REPL</h2>
                    <p class="mono card-subtitle mb-sm">Access <code>$todos</code> (Enumerable), run any Ruby</p>
                    <div id="repl-out" class="repl-output auto-scroll mono"></div>
                    <div class="repl-input-group">
                        <span class="repl-prompt">&gt;</span>
                        <input id="repl-in" class="input-repl mono" type="text"
                            placeholder="$todos.map(&:title).sort" />
                        <button id="repl-run-btn" class="btn-repl"><i class="ph-fill ph-play"></i></button>
                    </div>
                    <!-- Presets -->
                    <div class="repl-presets">
                        <button class="preset-btn mono" data-code="$todos.count">count</button>
                        <button class="preset-btn mono" data-code="$todos.select(&:done).count">done</button>
                        <button class="preset-btn mono"
                            data-code="$todos.group_by(&:priority).transform_values(&:count)">by priority</button>
                        <button class="preset-btn mono"
                            data-code="$todos.flat_map(&:tags).tally.sort_by{|_,v|-v}.to_h">tag freq</button>
                        <button class="preset-btn mono"
                            data-code="$todos.sort_by(&:created_at).map(&:title)">sorted</button>
                        <button class="preset-btn mono"
                            data-code="require 'json'; JSON.pretty_generate($todos.map(&:to_h))">JSON export</button>
                        <button class="preset-btn mono" data-code="$todos.min_by(&:priority_rank).title">top
                            priority</button>
                        <button class="preset-btn mono"
                            data-code="$todos.each_with_object(Hash.new(0)){|t,h| t.tags.each{|g| h[g]+=1}}.max_by{|_,v|v}">hottest
                            tag</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
